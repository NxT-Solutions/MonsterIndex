---
name: monsterindex-production

services:
  monster-index:
    image: ${MONSTER_INDEX_IMAGE:?MONSTER_INDEX_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    environment:
      APP_RUNTIME_ROLE: web
    expose:
      - "8080"
    volumes:
      - ./storage:/var/www/html/storage
    networks:
      web:
        aliases:
          - monster-index
      internal:

  monster-index-queue:
    image: ${MONSTER_INDEX_IMAGE:?MONSTER_INDEX_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    environment:
      APP_RUNTIME_ROLE: queue
    depends_on:
      - monster-index
    volumes:
      - ./storage:/var/www/html/storage
    networks:
      - internal

  monster-index-scheduler:
    image: ${MONSTER_INDEX_IMAGE:?MONSTER_INDEX_IMAGE is required}
    pull_policy: always
    restart: unless-stopped
    environment:
      APP_RUNTIME_ROLE: scheduler
    depends_on:
      - monster-index
    volumes:
      - ./storage:/var/www/html/storage
    networks:
      - internal

networks:
  web:
    external: true
  internal:
    external: true
