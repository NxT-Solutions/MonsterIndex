---
services:
  app:
    image: ${APP_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  queue:
    image: ${APP_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: queue
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  scheduler:
    image: ${APP_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: scheduler
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  web:
    image: ${WEB_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - ${APP_EXPOSED_PORT:-8080}:80

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_storage:
  redis_data:
