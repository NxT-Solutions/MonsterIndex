name: Staging Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".docker/staging/**"
      - ".github/workflows/staging-deploy.yml"
      - "codebase/**"
      - ".dockerignore"
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: monsterindex-app
  WEB_IMAGE_NAME: monsterindex-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      app_image: ${{ steps.image_vars.outputs.app_image }}
      web_image: ${{ steps.image_vars.outputs.web_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        id: image_vars
        run: |
          set -eu
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "app_image=${REGISTRY}/${owner_lc}/${APP_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "web_image=${REGISTRY}/${owner_lc}/${WEB_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.docker/staging/images/Dockerfile
          target: app
          push: true
          tags: |
            ${{ steps.image_vars.outputs.app_image }}:staging
            ${{ steps.image_vars.outputs.app_image }}:${{ github.sha }}
          cache-from: type=gha,scope=monsterindex-app
          cache-to: type=gha,mode=max,scope=monsterindex-app

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.docker/staging/images/Dockerfile
          target: web
          push: true
          tags: |
            ${{ steps.image_vars.outputs.web_image }}:staging
            ${{ steps.image_vars.outputs.web_image }}:${{ github.sha }}
          cache-from: type=gha,scope=monsterindex-web
          cache-to: type=gha,mode=max,scope=monsterindex-web

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload staging compose files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          source: ".docker/staging/compose.yaml,.docker/staging/.env.example"
          target: ${{ secrets.STAGING_PATH }}
          strip_components: 0

      - name: Deploy on Hetzner VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.STAGING_PATH }}
          APP_IMAGE: ${{ needs.build.outputs.app_image }}
          WEB_IMAGE: ${{ needs.build.outputs.web_image }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          envs: DEPLOY_PATH,APP_IMAGE,WEB_IMAGE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu

            mkdir -p "${DEPLOY_PATH}/.docker/staging"
            cd "${DEPLOY_PATH}"

            if [ ! -f ".docker/staging/.env" ]; then
              cp ".docker/staging/.env.example" ".docker/staging/.env"
              echo "Created .docker/staging/.env from template. Fill required secrets and re-run the workflow."
              exit 1
            fi

            upsert_env() {
              key="$1"
              value="$2"
              file="$3"
              if grep -q "^${key}=" "$file"; then
                sed -i "s#^${key}=.*#${key}=${value}#g" "$file"
              else
                printf '%s=%s\n' "${key}" "${value}" >> "$file"
              fi
            }

            upsert_env "APP_IMAGE" "${APP_IMAGE}" ".docker/staging/.env"
            upsert_env "WEB_IMAGE" "${WEB_IMAGE}" ".docker/staging/.env"
            upsert_env "IMAGE_TAG" "staging" ".docker/staging/.env"

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            compose_cmd="docker compose --env-file .docker/staging/.env -f .docker/staging/compose.yaml"

            ${compose_cmd} pull
            ${compose_cmd} up -d --remove-orphans

            ${compose_cmd} exec -T app php artisan migrate --force
            ${compose_cmd} exec -T app php artisan optimize:clear
            ${compose_cmd} exec -T app php artisan config:cache
            ${compose_cmd} exec -T app php artisan route:cache
            ${compose_cmd} exec -T app php artisan view:cache
