<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MonsterIndex Offline</title>
    <meta name="theme-color" content="#8CEB00">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Figtree", ui-sans-serif, system-ui, sans-serif;
            background: radial-gradient(120% 120% at 0% 0%, #1f3f08 0%, #060b0d 45%, #05090b 100%);
            color: #f4f7f2;
        }

        .card {
            width: min(90vw, 560px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            background: rgba(15, 24, 30, 0.82);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.3);
            padding: 28px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.8rem;
            line-height: 1.2;
        }

        p {
            margin: 0;
            color: rgba(244, 247, 242, 0.8);
        }

        a {
            display: inline-block;
            margin-top: 16px;
            color: #8ceb00;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>MonsterIndex is offline</h1>
        <p>Reconnect to keep tracking live Monster deal updates and push alerts.</p>
        <a href="/">Try again</a>
    </main>
</body>
</html>
